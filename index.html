<!DOCTYPE html>
<html>
<head>
  <title>Captured In Sea</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Captured In Sea</h1>
  <p>South East Asia • Sony A6400</p>

  <div class="gallery">
    <img src="photos/Phototest.JPG">

    <!-- hidden slider -->
    <input type="range" id="sizeSlider" min="500" max="1500" value="1500" style="display:none;">

    <!-- hidden admin panel -->
    <div id="adminPanel" style="display:none; margin-top:20px;">
      <h3 style="font-size:14px; margin-bottom:10px;">Admin Panel</h3>

      <label style="font-size:12px;">Image Width (px):</label>
      <input type="number" id="widthInput" min="300" max="2000" value="1500" style="width:80px;">

      <button id="copyCSS" style="margin-left:10px;">Copy CSS</button>

      <p id="cssOutput" style="font-size:12px; margin-top:10px; color:#555;"></p>
    </div>
  </div>

  <script>
    const slider = document.getElementById('sizeSlider');
    const img = document.querySelector('.gallery img');
    const adminPanel = document.getElementById('adminPanel');
    const widthInput = document.getElementById('widthInput');
    const cssOutput = document.getElementById('cssOutput');
    const copyBtn = document.getElementById('copyCSS');

    // Toggle slider with SHIFT + S
    document.addEventListener('keydown', (e) => {
      if (e.shiftKey && e.key === 'S') {
        slider.style.display = slider.style.display === 'none' ? 'block' : 'none';
      }
    });

    // Toggle admin panel with SHIFT + A
    document.addEventListener('keydown', (e) => {
      if (e.shiftKey && e.key === 'A') {
        adminPanel.style.display = adminPanel.style.display === 'none' ? 'block' : 'none';
      }
    });

    // Update image when number changes
    widthInput.addEventListener('input', () => {
      img.style.maxWidth = widthInput.value + 'px';
      cssOutput.textContent = `.gallery img { max-width: ${widthInput.value}px; }`;
    });

    // Copy CSS to clipboard
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(cssOutput.textContent);
      copyBtn.textContent = "Copied!";
      setTimeout(() => copyBtn.textContent = "Copy CSS", 1000);
    });
  </script>

</body>
</html>
